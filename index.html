<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inphase Project Calculator</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3348;
  --accent: #f0a500;
  --accent-hover: #d49200;
  --text: #e8eaf0;
  --text-dim: #8b91a8;
  --text-muted: #555d7a;
  --success: #2ecc71;
  --warning: #f39c12;
  --danger: #e74c3c;
  --info: #3498db;
  --r: 8px;
  --rl: 12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5;}
/* HEADER */
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;}
.logo-sep{width:1px;height:22px;background:var(--border);}
.logo-sub{color:var(--text-dim);font-size:13px;font-weight:500;}
.header-project{margin-left:auto;font-size:13px;color:var(--text-dim);}
.header-project span{color:var(--text);font-weight:600;}
/* STEPS NAV */
.steps-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;gap:0;overflow-x:auto;}
.step-tab{padding:13px 20px;font-size:13px;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:8px;transition:color .15s;user-select:none;}
.step-tab:hover:not(.locked){color:var(--text-dim);}
.step-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.step-tab.done{color:var(--text-dim);}
.step-tab.locked{cursor:not-allowed;opacity:.4;}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--border);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-tab.active .step-num{background:var(--accent);color:#000;}
.step-tab.done .step-num{background:var(--success);color:#000;}
/* MAIN */
.main{max-width:980px;margin:0 auto;padding:32px;}
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:24px;margin-bottom:16px;}
.card-title{font-size:15px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px;}
.card-sub{font-size:12px;color:var(--text-dim);font-weight:400;margin-top:3px;}
/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
.fg-full{grid-column:1/-1;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-label{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px;}
.form-label .req{color:var(--accent);}
input[type=text],input[type=number],input[type=date],select,textarea{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);padding:9px 12px;font-size:14px;width:100%;outline:none;transition:border-color .15s;font-family:inherit;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:#1a1d27;}
textarea{resize:vertical;min-height:80px;}
.input-hint{font-size:11px;color:var(--text-muted);margin-top:3px;}
/* TOGGLE GROUP */
.tg{display:flex;gap:6px;flex-wrap:wrap;}
.tg-btn{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text-dim);padding:8px 16px;font-size:13px;cursor:pointer;transition:all .15s;user-select:none;font-weight:500;}
.tg-btn:hover{border-color:var(--accent);color:var(--text);}
.tg-btn.sel{background:rgba(240,165,0,.15);border-color:var(--accent);color:var(--accent);font-weight:700;}
/* BUTTONS */
.btn{padding:10px 20px;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:8px;font-family:inherit;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--text);border-color:var(--text-dim);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid rgba(231,76,60,.4);}
.btn-danger:hover{background:rgba(231,76,60,.1);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-xs{padding:4px 8px;font-size:11px;}
.btn-row{display:flex;gap:10px;align-items:center;margin-top:24px;flex-wrap:wrap;}
/* ELEMENT CARDS */
.el-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:10px;overflow:hidden;}
.el-header{padding:13px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;transition:background .15s;}
.el-header:hover{background:rgba(255,255,255,.02);}
.el-num{width:28px;height:28px;border-radius:7px;background:var(--accent);color:#000;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.el-name{font-weight:600;flex:1;font-size:14px;}
.el-meta{font-size:11px;color:var(--text-muted);}
.el-chevron{color:var(--text-muted);font-size:12px;transition:transform .2s;margin-left:4px;}
.el-chevron.open{transform:rotate(90deg);}
.el-body{padding:18px;border-top:1px solid var(--border);display:none;}
.el-body.open{display:block;}
/* RUNS */
.runs-list{margin:8px 0 12px;}
.run-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 12px;}
.run-lbl{font-size:11px;color:var(--text-muted);width:44px;flex-shrink:0;font-weight:600;}
.run-row input{flex:1;min-width:0;}
.run-row .run-unit{font-size:11px;color:var(--text-muted);flex-shrink:0;}
.run-sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.run-del{background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;padding:0 4px;flex-shrink:0;line-height:1;}
.run-del:hover{color:var(--danger);}
/* ALERTS */
.alert{display:flex;gap:10px;padding:11px 14px;border-radius:var(--r);margin-bottom:10px;align-items:flex-start;font-size:13px;}
.alert-icon{flex-shrink:0;font-size:15px;line-height:1.4;}
.al-warn{background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.3);color:#f5b942;}
.al-err{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:#e74c3c;}
.al-info{background:rgba(52,152,219,.1);border:1px solid rgba(52,152,219,.3);color:#5dade2;}
.al-ok{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:#2ecc71;}
/* RESULTS */
.res-section{margin-bottom:28px;}
.res-section h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.bom-table{width:100%;border-collapse:collapse;}
.bom-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);padding:6px 10px;border-bottom:1px solid var(--border);}
.bom-table td{padding:10px 10px;font-size:13px;border-bottom:1px solid rgba(46,51,72,.4);vertical-align:top;}
.bom-table tr:last-child td{border-bottom:none;}
.bom-sku{font-size:11px;color:var(--text-muted);font-family:monospace;display:block;margin-top:2px;}
.bom-qty{font-weight:800;color:var(--accent);font-size:16px;}
.bom-note{font-size:11px;color:var(--text-dim);margin-top:3px;}
.bom-group-header{background:rgba(240,165,0,.05);}
.bom-group-header td{font-size:12px;font-weight:700;color:var(--accent);padding:8px 10px;}
.flag-w{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(243,156,18,.2);color:var(--warning);text-transform:uppercase;margin-left:6px;}
.flag-e{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(231,76,60,.2);color:var(--danger);text-transform:uppercase;margin-left:6px;}
/* MANUAL ADD */
.ma-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:7px;}
.ma-info{flex:1;min-width:0;}
.ma-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ma-sku{font-size:11px;color:var(--text-muted);font-family:monospace;}
.ma-qty-wrap{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ma-qty-wrap input{width:64px;}
.ma-note-wrap{flex:1;min-width:0;}
/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px;}
.search-wrap input{padding-left:34px;}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none;}
.prod-list{max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--r);background:var(--surface2);}
.prod-cat-header{padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);background:rgba(255,255,255,.02);position:sticky;top:0;z-index:1;}
.prod-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;border-bottom:1px solid rgba(46,51,72,.3);transition:background .12s;}
.prod-item:hover{background:rgba(240,165,0,.07);}
.prod-item:last-child{border-bottom:none;}
.prod-item-info{flex:1;min-width:0;}
.prod-item-name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-item-sku{font-size:11px;color:var(--text-muted);font-family:monospace;}
.prod-item-add{background:var(--accent);color:#000;border:none;border-radius:5px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;}
.prod-item-add:hover{background:var(--accent-hover);}
/* BRACKET OPTIONS */
.bracket-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin:10px 0;}
.bracket-opt{padding:11px 13px;border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s;background:var(--surface);}
.bracket-opt:hover{border-color:var(--accent);}
.bracket-opt.sel{border-color:var(--accent);background:rgba(240,165,0,.08);}
.bracket-opt.recommended{border-color:rgba(240,165,0,.5);}
.bracket-rec-tag{font-size:10px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.bracket-opt-name{font-size:12px;font-weight:600;line-height:1.3;}
.bracket-opt-sku{font-size:11px;color:var(--text-muted);font-family:monospace;margin-top:2px;}
/* SECTION DIVIDER */
.sec-divider{border:none;border-top:2px solid var(--border);margin:32px 0;}
/* GROUP TAG */
.group-chip{display:inline-flex;align-items:center;gap:4px;background:rgba(52,152,219,.15);border:1px solid rgba(52,152,219,.3);border-radius:4px;font-size:11px;color:#5dade2;padding:2px 8px;font-weight:600;}
/* PAGE HEADER */
.page-hdr{margin-bottom:24px;}
.page-hdr h1{font-size:22px;font-weight:800;margin-bottom:4px;}
.page-hdr p{font-size:14px;color:var(--text-dim);}
/* SUMMARY LINE */
.summary-row{display:flex;gap:20px;flex-wrap:wrap;padding:14px 18px;background:rgba(240,165,0,.05);border:1px solid rgba(240,165,0,.15);border-radius:var(--r);margin-top:16px;}
.sum-item{display:flex;flex-direction:column;gap:1px;}
.sum-val{font-size:18px;font-weight:800;color:var(--accent);}
.sum-lbl{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;}
/* PRINT */
@media print{
  .app-header,.steps-nav,.btn-row,.no-print{display:none!important;}
  .print-only{display:block!important;}
  body{background:#fff;color:#000;}
  .card,.el-card{border:1px solid #ccc;background:#fff;}
  .bom-table td,.bom-table th{color:#000;}
  .main{padding:0;}
}
.print-only{display:none;}
/* RESPONSIVE */
@media(max-width:640px){
  .main{padding:16px;}
  .form-grid,.form-grid-3{grid-template-columns:1fr;}
  .steps-nav{padding:0 16px;}
  .app-header{padding:14px 16px;}
}
</style>
</head>

function P(sku){ return PRODUCTS.find(p => p.sku === sku); }

// ============================================================
function uid(){ return Math.random().toString(36).slice(2,10); }
function today(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}
function newRun(){ return { id:uid(), qty:'1', footage:'', tailQty:'1', tailFt:'', needsDiffusion:null, diffusionSku:'' }; }
function newProduct(){
  return {
    id: uid(),
    ledSku: '',
    runs: [newRun()],
    units: '',
    tailFt: '',
    needsBrackets: null,
    bracketSku: '',
    splitterRuns: [],
  };
}
function newElement(){
  return {
    id: uid(),
    name: '',
    products: [newProduct()],
    groupId: '',
    collapsed: false,
  };
}

let S = {
  step: 1,
  proj: {
    name: '', client: '', date: today(),
    voltage: 24, controlType: 'dmx', class2: false, dimmerPS: '', notes: ''
  },
  elements: [],
  manualItems: [],
  manualSearch: '',
  ctrlOverrides: {},   // { [groupId]: qty } — user-specified controller count per group
};

// ============================================================
//  CALCULATION ENGINE
// ============================================================
function calcProductSection(ps){
  const prod = P(ps.ledSku);
  if(!prod) return null;
  const cableType = prod.channels === 2 ? 3 : 6;
  let totalFt = 0, totalW = 0, totalUnits = 0, cableFt6 = 0, cableFt3 = 0;

  const diffusion = {}; // { sku: { prod, ft } }

  if(prod.type === 'tape'){
    ps.runs.forEach(r => {
      const qty  = Math.max(1, parseInt(r.qty) || 1);
      const ft   = (parseFloat(r.footage) || 0) * qty;
      const tail = (parseInt(r.tailQty) || 0) * (parseFloat(r.tailFt) || 0);
      totalFt += ft;
      if(cableType === 6) cableFt6 += tail; else cableFt3 += tail;
      // Diffusion — only for non-Neoflex tape
      if(!prod.neoflex && r.needsDiffusion && r.diffusionSku){
        if(!diffusion[r.diffusionSku]) diffusion[r.diffusionSku] = { prod: P(r.diffusionSku), ft: 0 };
        if(diffusion[r.diffusionSku].prod) diffusion[r.diffusionSku].ft += ft;
      }
    });
    totalW = totalFt * prod.wPerFt;
  } else {
    totalUnits = parseInt(ps.units) || 0;
    totalW = totalUnits * prod.wPerUnit;
    const tail = parseFloat(ps.tailFt) || 0;
    if(cableType === 6) cableFt6 += tail; else cableFt3 += tail;
  }

  // Compute diffusion rolls
  Object.values(diffusion).forEach(d => {
    if(d.prod) d.rolls = Math.ceil(d.ft / d.prod.rollFt);
  });

  const rollsNeeded = prod.type === 'tape' ? Math.ceil(totalFt / prod.rollFt) : 0;
  let bracketFt = 0, bracketRolls = 0;
  if(ps.needsBrackets && ps.bracketSku){
    const brkt = P(ps.bracketSku);
    if(brkt){ bracketFt = totalFt; bracketRolls = Math.ceil(bracketFt / brkt.rollFt); }
  }

  const runDetails = prod.type === 'tape'
    ? ps.runs.filter(r => parseFloat(r.footage) > 0).map(r => {
        const qty = Math.max(1, parseInt(r.qty) || 1);
        const ft  = parseFloat(r.footage) || 0;
        return { qty, footage: ft, totalFt: qty * ft };
      })
    : [];

  // Splitter recommendation based on how many runs the user marked as splitter-connected
  const splitterRunIds = ps.splitterRuns || [];
  const splitterCount  = splitterRunIds.length;
  let splitter = null;
  if(splitterCount >= 2){
    const sku  = splitterCount <= 3 ? '5500.000' : '5500.090';
    const sprod = PRODUCTS.find(p => p.sku === sku);
    if(sprod) splitter = { prod: sprod, qty: 1, runCount: splitterCount };
  }

  return {
    id: ps.id, prod, totalFt, totalW, totalUnits, rollsNeeded,
    cableType, cableFt6, cableFt3, channels: prod.channels,
    bracketSku: ps.needsBrackets ? ps.bracketSku : null, bracketFt, bracketRolls,
    diffusion, runDetails, splitter,
  };
}

function calcElement(el){
  const sections = (el.products || []).map(calcProductSection).filter(Boolean);
  if(!sections.length) return null;
  return {
    id: el.id,
    name: el.name,
    groupId: el.groupId || el.id,
    sections,
    totalW:        sections.reduce((s,p) => s + p.totalW,    0),
    totalChannels: sections.reduce((s,p) => s + p.channels,  0),
    cableFt6:      sections.reduce((s,p) => s + p.cableFt6,  0),
    cableFt3:      sections.reduce((s,p) => s + p.cableFt3,  0),
  };
}

function selectController(groupName, totalChannels, totalW, totalFt, voltage, controlType, isClass2, ctrlQtyOverride){
  const warnings = [];
  const equipment  = [];
  const dimmerPS   = S.proj.dimmerPS; // 'builtin' | 'external' | ''

  if(controlType === 'manual'){
    let dimmers = PRODUCTS.filter(p => p.type === 'dimmer');
    // Filter by power supply type when the user has made a choice
    if(dimmerPS === 'builtin')   dimmers = dimmers.filter(d => d.builtinPS === true);
    if(dimmerPS === 'external')  dimmers = dimmers.filter(d => d.builtinPS === false);

    const byVolt = dimmers.filter(d => d.voltage === null || d.voltage === voltage);
    // Find the best single dimmer that covers channels AND wattage
    const adequate = byVolt.filter(d => d.channels >= totalChannels && (d.maxW === null || d.maxW >= totalW));
    adequate.sort((a,b) => a.channels - b.channels || (a.maxW||0) - (b.maxW||0));

    if(adequate.length){
      const computedQty = 1;
      const qty = (ctrlQtyOverride !== undefined && ctrlQtyOverride > computedQty) ? ctrlQtyOverride : computedQty;
      equipment.push({ prod:adequate[0], qty, note: qty > computedQty ? `${qty} units (${computedQty} min — ${qty-computedQty} added for load splitting)` : '' });
      if(adequate[0].maxW && totalW > adequate[0].maxW * 0.9)
        warnings.push({ lvl:'warning', text:`"${groupName}": Load (${totalW.toFixed(1)}W) is above 90% of dimmer capacity (${adequate[0].maxW}W). Consider de-rating.` });
    } else {
      // No single unit covers it — find the best available and calculate how many are needed
      const byCh = byVolt.filter(d => d.channels >= totalChannels);
      byCh.sort((a,b) => (b.maxW||0) - (a.maxW||0));
      const byWOnly = byVolt.filter(d => d.maxW && d.maxW > 0);
      byWOnly.sort((a,b) => (b.channels||0) - (a.channels||0) || (b.maxW||0) - (a.maxW||0));

      // Use highest-capacity dimmer in the filtered set
      const candidate = byCh[0] || byWOnly[0];
      if(candidate){
        const unitsForW  = candidate.maxW  ? Math.ceil(totalW  / candidate.maxW)  : 1;
        const unitsForCh = Math.ceil(totalChannels / candidate.channels);
        const computedQty = Math.max(unitsForW, unitsForCh);
        const qty = (ctrlQtyOverride !== undefined && ctrlQtyOverride > computedQty) ? ctrlQtyOverride : computedQty;
        const extraNote = qty > computedQty ? ` (+${qty-computedQty} for load splitting)` : '';
        equipment.push({ prod:candidate, qty, note:`${qty} units — distributes ${totalW.toFixed(0)}W across ${totalChannels} ch${extraNote}` });
        if(qty > 1)
          warnings.push({ lvl:'info', text:`"${groupName}": Load requires ${computedQty}× ${candidate.name} — split wiring across units to stay within per-unit limits.` });
      } else {
        warnings.push({ lvl:'danger', text:`"${groupName}": No compatible dimmer found for ${totalChannels} ch at ${voltage}V with ${dimmerPS ? (dimmerPS==='builtin'?'built-in PS':'external PS') : 'any PS type'}.` });
      }
    }
  } else {
    // DMX
    if(isClass2){
      const skuSys1 = voltage === 12 ? '152X.000' : '153X.000';
      const sys1 = P(skuSys1);
      if(!sys1){ warnings.push({ lvl:'danger', text:`System 1 Controller not found for ${voltage}V.` }); return {equipment,warnings}; }
      const dec5408s1 = P('1500.000');
      const dec2504s1 = P('1D00.000');

      // Units driven by wattage only — same 5-channel address space shared across all units
      const unitsByW = Math.ceil(totalW / 96);
      const units    = ctrlQtyOverride !== undefined ? ctrlQtyOverride : Math.max(1, unitsByW);
      const ctrlNote = units > 1 ? `${units} units — load requires ${totalW.toFixed(0)}W` : '';
      equipment.push({ prod:sys1, qty:units, note:ctrlNote });
      if(units > 1)
        warnings.push({ lvl:'info', text:`"${groupName}": ${units}× System 1 required to handle ${totalW.toFixed(0)}W. Distribute elements across units accordingly.` });
      const wPerUnit = totalW / units;
      if(wPerUnit > 86)
        warnings.push({ lvl:'warning', text:`"${groupName}": ${wPerUnit.toFixed(1)}W per System 1 unit (${((wPerUnit/96)*100).toFixed(0)}% of 96W Class 2 limit). Monitor thermal headroom.` });

      // Decoders for channels beyond the 5 native — no Bridge needed with System 1
      const nativeChS1 = 5;
      const addlChS1   = Math.max(0, totalChannels - nativeChS1);
      if(addlChS1 > 0){
        if(addlChS1 <= 5){
          equipment.push({ prod:dec5408s1, qty:1, note:'+5 ch' });
        } else if(addlChS1 <= 10){
          equipment.push({ prod:dec5408s1, qty:2, note:'+10 ch' });
        } else if(addlChS1 <= 15){
          equipment.push({ prod:dec5408s1, qty:3, note:'+15 ch' });
        } else if(addlChS1 <= 25){
          equipment.push({ prod:dec2504s1, qty:1, note:'+25 ch (priority for 20+ ch)' });
        } else {
          equipment.push({ prod:dec2504s1, qty:1, note:'+25 ch' });
          warnings.push({ lvl:'danger', text:`"${groupName}": ${totalChannels} channels needed — exceeds 30-ch max per System 1 stack. Consider splitting into separate control groups.` });
        }
      }
    } else {
      const skuSys2 = voltage === 12 ? '1520.000' : '1530.000';
      const sys2 = P(skuSys2);
      const bridge  = P('9006.000');
      const dec5408 = P('1500.000');
      const dec2504 = P('1D00.000');
      if(!sys2){ warnings.push({ lvl:'danger', text:`System 2 Controller not found for ${voltage}V.` }); return {equipment,warnings}; }

      const amps = totalW / voltage;
      // How many controllers are needed for load alone?
      const unitsByW = Math.ceil(totalW  / 600);
      const unitsByA = Math.ceil(amps    / 25);
      // ctrlQtyOverride sums per-element counts so each element is sized independently
      const ctrlQty  = ctrlQtyOverride !== undefined ? ctrlQtyOverride : Math.max(1, unitsByW, unitsByA);

      equipment.push({ prod:sys2, qty:ctrlQty, note: ctrlQty > 1 ? `${ctrlQty} units — load requires ${totalW.toFixed(0)}W / ${amps.toFixed(1)}A` : '' });
      if(ctrlQty > 1)
        warnings.push({ lvl:'info', text:`"${groupName}": ${ctrlQty}× System 2 required to handle ${totalW.toFixed(0)}W / ${amps.toFixed(1)}A. Distribute elements across units accordingly.` });

      // Native channels = 5 regardless of controller count — multiple controllers share the
      // same 5-channel address space for wattage distribution, not for additional channels.
      const nativeCh = 5;
      const addlCh   = Math.max(0, totalChannels - nativeCh);

      if(addlCh > 0){
        // Decoder and Bridge always attach to one System 2 only — bridge qty is always 1
        if(addlCh <= 5){
          equipment.push({ prod:dec5408, qty:1, note:'+5 ch' });
          equipment.push({ prod:bridge,  qty:1, note:'Required with decoder' });
        } else if(addlCh <= 10){
          equipment.push({ prod:dec5408, qty:2, note:'+10 ch' });
          equipment.push({ prod:bridge,  qty:1, note:'Required with decoder' });
        } else if(addlCh <= 15){
          equipment.push({ prod:dec5408, qty:3, note:'+15 ch' });
          equipment.push({ prod:bridge,  qty:1, note:'Required with decoder' });
        } else if(addlCh <= 25){
          equipment.push({ prod:dec2504, qty:1, note:'+25 ch (priority for 20+ ch)' });
          equipment.push({ prod:bridge,  qty:1, note:'Required with decoder' });
        } else {
          equipment.push({ prod:dec2504, qty:1, note:'+25 ch' });
          equipment.push({ prod:bridge,  qty:1, note:'Required with decoder' });
          warnings.push({ lvl:'danger', text:`"${groupName}": ${totalChannels} channels needed — exceeds 30-ch max per System 2 stack. Consider splitting into separate control groups.` });
        }
      }

      // Near-limit headroom warnings (only if single controller, multi-controller splits the load)
      if(ctrlQty === 1){
        if(totalW > 540)
          warnings.push({ lvl:'warning', text:`"${groupName}": Load is ${totalW.toFixed(1)}W (${((totalW/600)*100).toFixed(0)}% of 600W). Allow thermal headroom.` });
        if(amps > 22.5)
          warnings.push({ lvl:'warning', text:`"${groupName}": ${amps.toFixed(1)}A at ${voltage}V (${((amps/25)*100).toFixed(0)}% of 25A max).` });
      }
    }
  }
  return { equipment, warnings };
}

function calculateProject(){
  const results = { ledItems:[], controllers:[], cable6Ft:0, cable3Ft:0, brackets:{}, diffusion:{}, warnings:[], groups:[] };
  const calcEls = S.elements.map(calcElement).filter(Boolean);

  // Cable, bracket, diffusion aggregation (global)
  calcEls.forEach(ce => {
    results.cable6Ft += ce.cableFt6;
    results.cable3Ft += ce.cableFt3;
    ce.sections.forEach(sec => {
      if(sec.bracketSku){
        if(!results.brackets[sec.bracketSku]) results.brackets[sec.bracketSku] = { prod:P(sec.bracketSku), ft:0, rolls:0 };
        results.brackets[sec.bracketSku].ft += sec.bracketFt;
      }
      Object.entries(sec.diffusion || {}).forEach(([sku, d]) => {
        if(!d.prod) return;
        if(!results.diffusion[sku]) results.diffusion[sku] = { prod:d.prod, ft:0, rolls:0 };
        results.diffusion[sku].ft += d.ft;
      });
    });
  });
  Object.values(results.brackets).forEach(b => { b.rolls = Math.ceil(b.ft / b.prod.rollFt); });
  Object.values(results.diffusion).forEach(d => { d.rolls = Math.ceil(d.ft / d.prod.rollFt); });

  // Project-wide LED totals per SKU (used only for summary line counts)
  const ledMap = {};
  calcEls.forEach(ce => {
    ce.sections.forEach(sec => {
      const k = sec.prod.sku;
      if(!ledMap[k]) ledMap[k] = { prod:sec.prod, totalFt:0, totalUnits:0, rollsNeeded:0, totalW:0 };
      ledMap[k].totalFt    += sec.totalFt;
      ledMap[k].totalUnits += sec.totalUnits;
      ledMap[k].totalW     += sec.totalW;
    });
  });
  Object.values(ledMap).forEach(item => {
    if(item.prod.type === 'tape') item.rollsNeeded = Math.ceil(item.totalFt / item.prod.rollFt);
    results.ledItems.push(item);
  });

  // Group elements
  const groupMap = {};
  calcEls.forEach(ce => {
    const gid = ce.groupId;
    if(!groupMap[gid]) groupMap[gid] = { id:gid, name:'', elements:[], totalW:0, skuChannels:{}, voltage:S.proj.voltage };
    groupMap[gid].elements.push(ce);
    groupMap[gid].totalW += ce.totalW;
    // Track unique product SKUs — same SKU across multiple elements shares the same DMX
    // channel addresses, so it only contributes its channel count once to the group total.
    ce.sections.forEach(sec => {
      groupMap[gid].skuChannels[sec.prod.sku] = sec.prod.channels;
    });
  });
  // Resolve totalChannels from unique SKUs
  Object.values(groupMap).forEach(g => {
    g.totalChannels = Object.values(g.skuChannels).reduce((s,ch) => s+ch, 0);
  });

  // Name groups and select controllers
  Object.values(groupMap).forEach(g => {
    const names = g.elements.map(e => e.name || '(unnamed)');
    g.name = names.length === 1 ? names[0] : names.join(' + ');

    // Controller sizing:
    // Elements needing >1 controller get dedicated units (load can't be split across other elements).
    // Elements that each fit within 1 controller share a pool sized by their combined wattage.
    // Example: 3 large triangles (2+2+3=7); 4 small elements sharing 3 controllers (ceil 1244/600).
    let computedCtrlQty;
    if(S.proj.class2){
      let largeCtrl = 0, smallTotalW = 0;
      g.elements.forEach(ce => {
        const perEl = Math.max(1, Math.ceil(ce.totalW / 96));
        if(perEl > 1) largeCtrl += perEl; else smallTotalW += ce.totalW;
      });
      const smallCtrl = smallTotalW > 0 ? Math.max(1, Math.ceil(smallTotalW / 96)) : 0;
      computedCtrlQty = largeCtrl + smallCtrl;
    } else if(S.proj.controlType !== 'manual'){
      let largeCtrl = 0, smallTotalW = 0;
      g.elements.forEach(ce => {
        const a = ce.totalW / g.voltage;
        const perEl = Math.max(1, Math.ceil(ce.totalW / 600), Math.ceil(a / 25));
        if(perEl > 1) largeCtrl += perEl; else smallTotalW += ce.totalW;
      });
      const smallPoolA = smallTotalW / g.voltage;
      const smallCtrl = smallTotalW > 0
        ? Math.max(1, Math.ceil(smallTotalW / 600), Math.ceil(smallPoolA / 25))
        : 0;
      computedCtrlQty = largeCtrl + smallCtrl;
    } else {
      // For dimmers, let selectController compute its own minimum; override applies on top
      computedCtrlQty = undefined;
    }

    // Apply user override — any qty ≥ 1 is accepted
    const userOverride = S.ctrlOverrides[g.id] ? parseInt(S.ctrlOverrides[g.id]) : null;
    const ctrlQtyOverride = (userOverride && userOverride >= 1) ? userOverride : computedCtrlQty;
    g.computedCtrlQty = computedCtrlQty;
    g.actualCtrlQty   = ctrlQtyOverride;

    const { equipment, warnings } = selectController(g.name, g.totalChannels, g.totalW, 0, g.voltage, S.proj.controlType, S.proj.class2, ctrlQtyOverride);
    g.equipment = equipment;
    results.warnings.push(...warnings);
    results.groups.push(g);
  });

  results.cable6Boxes = Math.ceil(results.cable6Ft / 500);
  results.cable3Boxes = Math.ceil(results.cable3Ft / 500);
  return results;
}

function h(tag, attrs, ...children){

function $(id){ return document.getElementById(id); }
function setHTML(id, html){ const el=$(id); if(el) el.innerHTML=html; }

function fmt(n, d=1){ return Number(n).toFixed(d).replace(/\.0$/,''); }

function renderNav(){
  const steps = [
    { n:1, label:'Project Setup'    },
    { n:2, label:'Elements'         },
    { n:3, label:'Additional Items' },
    { n:4, label:'Results & BOM'    },
  ];
  const stepsLocked = { 2: !S.proj.name, 3: !S.proj.name || S.elements.length===0, 4: !S.proj.name || S.elements.length===0 };
  $('stepsNav').innerHTML = steps.map(s => {
    let cls = '';
    if(s.n === S.step) cls = 'active';
    else if(s.n < S.step) cls = 'done';
    else if(stepsLocked[s.n]) cls = 'locked';
    const onclick = (cls === 'locked') ? '' : `onclick="gotoStep(${s.n})"`;
    const numHtml = (s.n < S.step) ? '✓' : s.n;
    return `<div class="step-tab ${cls}" ${onclick}><span class="step-num">${numHtml}</span>${s.label}</div>`;
  }).join('');

  const hp = $('headerProject');
  if(hp) hp.innerHTML = S.proj.name ? `Project: <span>${escH(S.proj.name)}</span>` : '';
}

function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function buildLedOptions(){
  const tape = PRODUCTS.filter(p=>p.type==='tape');
  const units = PRODUCTS.filter(p=>p.type==='unit');
  let html = '<option value="">— Select LED Product —</option>';
  html += '<optgroup label="── LED Tape ──────────────────────────">';
  tape.forEach(p=>{ html+=`<option value="${p.sku}">${escH(p.name)} (${p.channels}ch, ${fmt(p.wPerFt,2)}W/ft)</option>`; });
  html += '</optgroup>';
  html += '<optgroup label="── Fixtures (plates, cans, sheets) ──">';
  units.forEach(p=>{ html+=`<option value="${p.sku}">${escH(p.name)} (${p.channels}ch, ${p.wPerUnit}W/unit)</option>`; });
  html += '</optgroup>';
  return html;
}

function renderElementCard(el, idx, ledOptions){
  const open = !el.collapsed;
  const prods = (el.products||[]).filter(ps=>ps.ledSku);
  const summary = prods.length === 0 ? 'No products selected'
    : prods.map(ps=>{ const p=P(ps.ledSku); return p?`${p.channels}ch`:''; }).filter(Boolean).join(' + ') + ' channels';

  const otherElements = S.elements.filter(e=>e.id!==el.id && e.name);

  let html = `
  <div class="el-card" id="elcard-${el.id}">
    <div class="el-header" onclick="toggleElement('${el.id}')">
      <div class="el-num">${idx+1}</div>

        <div class="el-name">${escH(el.name)||'<span style="color:var(--text-muted)">Unnamed Element</span>'}</div>
        <div class="el-meta">${summary}${el.groupId?` · <span class="group-chip">⛓ Grouped</span>`:''}</div>

    html += renderProductSection(el.id, ps, pi, el.products.length, ledOptions);

  html += `
      <button class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="addProduct('${el.id}')">+ Add LED Product to this Element</button>
      <hr class="sec-divider" style="margin:16px 0">
      <div class="form-group">
        <label class="form-label">Group With Elements</label>
        <div class="input-hint" style="margin-bottom:8px">Grouped elements share a controller — wattage and channels combine.</div>
        ${otherElements.length === 0
          ? `<div style="color:var(--text-muted);font-size:13px;padding:8px 0">No other named elements available yet.</div>`
          : `<div style="display:flex;flex-direction:column;gap:6px;margin-top:4px">${otherElements.map(other=>{
              const checked = el.groupId!=='' && el.groupId!=null && el.groupId===(other.groupId||other.id);
              return `<label style="display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid ${checked?'var(--accent)':'var(--border)'};border-radius:var(--r);cursor:pointer;background:${checked?'rgba(240,165,0,.07)':'var(--surface)'};transition:all .15s">
                <input type="checkbox" ${checked?'checked':''} onchange="toggleGroupMember('${el.id}','${other.id}',this.checked)" style="accent-color:var(--accent);width:15px;height:15px;cursor:pointer">

        <button class="btn btn-danger btn-sm" onclick="removeElement('${el.id}')">Remove Element</button>

}

function renderProductSection(elId, ps, idx, total, ledOptions){
  const prod = ps.ledSku ? P(ps.ledSku) : null;
  const isTape = prod && prod.type === 'tape';
  const isUnit = prod && prod.type === 'unit';
  const isNeoflex = prod && prod.neoflex;
  const selOpts = ledOptions.replace(`value="${ps.ledSku}"`, `value="${ps.ledSku}" selected`);
  const label = total > 1 ? `LED Product ${idx+1}` : 'LED Product';

  let html = `<div class="prod-section" id="ps-${ps.id}" style="border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px;background:var(--surface)">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
      <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);flex:1">${label}</span>
      ${total>1?`<button class="btn btn-danger btn-xs" onclick="removeProduct('${elId}','${ps.id}')">Remove</button>`:''}
    </div>
    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Product</label>
      <select onchange="updateProdSku('${elId}','${ps.id}',this.value)">${selOpts}</select>
    </div>`;

  if(isTape){
    html += `<div>
      <label class="form-label">Runs</label>
      <div class="input-hint" style="margin-bottom:8px">Qty × footage per run. Tail = wire from controller to tape start.</div>
      <div class="runs-list">
        ${ps.runs.map((r,ri) => renderRunRow(elId, ps.id, r, ri, ps.runs.length, prod)).join('')}
      </div>
      <button class="btn btn-ghost btn-sm" onclick="addRun('${elId}','${ps.id}')">+ Add Run</button>
    </div>`;

    if(ps.runs.length >= 2){
      const splRuns = ps.splitterRuns || [];
      const splCount = splRuns.length;
      let splPreview = '';
      if(splCount >= 2 && splCount <= 3)      splPreview = `<span style="font-size:11px;color:var(--accent)">→ BOB 3.0 Splitter (5500.000) will be added to BOM</span>`;
      else if(splCount >= 4 && splCount <= 9)  splPreview = `<span style="font-size:11px;color:var(--accent)">→ Connect10 Splitter (5500.090) will be added to BOM</span>`;
      else if(splCount > 9)                    splPreview = `<span style="font-size:11px;color:#e55">⚠ Connect10 supports max 9 outputs — consider splitting into multiple groups</span>`;
      else if(splCount === 1)                  splPreview = `<span style="font-size:11px;color:var(--text-dim)">Select at least 2 runs to require a splitter</span>`;

      html += `<div style="margin-top:12px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r)">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);margin-bottom:8px">Splitter</div>
        <div class="input-hint" style="margin-bottom:10px">Select which runs will be connected via a splitter to share one controller output.</div>
        <div style="display:flex;flex-wrap:wrap;gap:12px;margin-bottom:${splPreview?'8px':'0'}">
          ${ps.runs.map((r,ri) => {
            const chk = splRuns.includes(r.id) ? 'checked' : '';
            return `<label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer;user-select:none">
              <input type="checkbox" ${chk} onchange="toggleSplitterRun('${elId}','${ps.id}','${r.id}',this.checked)">
              Run ${ri+1}
            </label>`;
          }).join('')}
        </div>
        ${splPreview ? `<div style="margin-top:4px">${splPreview}</div>` : ''}
      </div>`;
    }
  } else if(isUnit){
    html += `<div class="form-grid">
      <div class="form-group">
        <label class="form-label">Quantity of Units</label>
        <input type="number" min="1" value="${escH(ps.units)}" placeholder="0"
          oninput="updateProd('${elId}','${ps.id}','units',this.value)">
      </div>
      <div class="form-group">
        <label class="form-label">Total Tail / Wire (ft)</label>
        <input type="number" min="0" step="0.5" value="${escH(ps.tailFt)}" placeholder="0"
          oninput="updateProd('${elId}','${ps.id}','tailFt',this.value)">
      </div>
    </div>`;
  }

  if(isNeoflex) html += renderBracketPrompt(elId, ps, prod);

  html += `</div>`;
  return html;
}

function renderRunRow(elId, psId, run, idx, total, prod){
  const qty = parseInt(run.qty) || 1;
  const ft  = parseFloat(run.footage) || 0;
  const subtotal = qty > 1 && ft > 0 ? ` = ${(qty*ft).toFixed(1)} ft` : '';
  const showDiffusion = prod && prod.type === 'tape' && !prod.neoflex;

  let diffHtml = '';
  if(showDiffusion){
    const diffProds = PRODUCTS.filter(p => p.type === 'diffusion');
    const diffSelOpts = `<option value="">— Select type —</option>` +
      diffProds.map(p => `<option value="${escH(p.sku)}" ${run.diffusionSku===p.sku?'selected':''}>${escH(p.name)}</option>`).join('');
    diffHtml = `
    <div class="run-diffusion" id="diff-${run.id}" style="margin-top:8px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);display:flex;align-items:center;flex-wrap:wrap;gap:10px">
      <span style="font-size:11px;font-weight:600;color:var(--text-dim);flex:none">Silicone diffusion for Run ${idx+1}?</span>
      <div class="tg" style="flex:none">
        <div class="tg-btn ${run.needsDiffusion===true?'sel':''}"  onclick="updateRunDiffusion('${elId}','${psId}','${run.id}',true)">Yes</div>
        <div class="tg-btn ${run.needsDiffusion===false?'sel':''}" onclick="updateRunDiffusion('${elId}','${psId}','${run.id}',false)">No</div>
      </div>
      ${run.needsDiffusion===true ? `<select style="flex:1;min-width:200px" onchange="updateRun('${elId}','${psId}','${run.id}','diffusionSku',this.value);rerenderEl('${elId}')">${diffSelOpts}</select>` : ''}
    </div>`;
  }

  return `
  <div class="run-row" id="run-${run.id}" style="flex-wrap:wrap">
    <span class="run-lbl">Run ${idx+1}</span>
    <input type="number" min="1" step="1" value="${escH(run.qty||'1')}" placeholder="Qty" title="Number of identical runs"
      style="width:60px;flex:none" oninput="updateRun('${elId}','${psId}','${run.id}','qty',this.value)">
    <span class="run-unit" title="Number of identical runs at this length">runs ×</span>
    <input type="number" min="0" step="0.5" value="${escH(run.footage)}" placeholder="ft each"
      oninput="updateRun('${elId}','${psId}','${run.id}','footage',this.value)">
    <span class="run-unit" style="white-space:nowrap">ft each${subtotal?`<b style="color:var(--accent)">${subtotal}</b>`:''}</span>
    <div class="run-sep"></div>
    <input type="number" min="0" step="1" value="${escH(run.tailQty||'1')}" placeholder="Tails" title="Number of tails for this run"
      style="width:55px;flex:none" oninput="updateRun('${elId}','${psId}','${run.id}','tailQty',this.value)">
    <span class="run-unit">tail(s) ×</span>
    <input type="number" min="0" step="0.5" value="${escH(run.tailFt)}" placeholder="ft ea."
      style="width:80px;flex:none" oninput="updateRun('${elId}','${psId}','${run.id}','tailFt',this.value)">
    <span class="run-unit">ft</span>
    ${total>1?`<button class="run-del" onclick="removeRun('${elId}','${psId}','${run.id}')" title="Remove run">×</button>`:'<span style="width:24px"></span>'}
    ${diffHtml ? `<div style="width:100%">${diffHtml}</div>` : ''}
  </div>`;
}

function updateRunDiffusion(elId, psId, runId, val){
  const ps = findPS(elId, psId);
  if(!ps) return;
  const r = ps.runs.find(r => r.id === runId);
  if(!r) return;
  r.needsDiffusion = val;
  if(!val) r.diffusionSku = '';
  rerenderEl(elId);
}

function renderBracketPrompt(elId, ps, prod){
  let html = `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
  <label class="form-label">Mounting Brackets for Neoflex</label>
  <div class="input-hint" style="margin-bottom:8px">Are mounting brackets needed for this product?</div>
  <div class="tg">
    <div class="tg-btn ${ps.needsBrackets===true?'sel':''}"  onclick="updateProd('${elId}','${ps.id}','needsBrackets',true);rerenderEl('${elId}')">Yes</div>
    <div class="tg-btn ${ps.needsBrackets===false?'sel':''}" onclick="updateProd('${elId}','${ps.id}','needsBrackets',false);rerenderEl('${elId}')">No</div>
  </div></div>`;

  if(ps.needsBrackets === true){
    const brackets = PRODUCTS.filter(p=>p.type==='bracket');
    html += `<div style="margin-top:10px">
      <label class="form-label">Select Bracket Size</label>
      <div class="input-hint" style="margin-bottom:8px">Sold in 5M (16.4ft) rolls — quantity calculated from tape footage.</div>
      <div class="bracket-grid">`;
    brackets.forEach(b=>{
      const isRec = b.neoflexFit && b.neoflexFit === prod.neoflexType;
      const isSel = ps.bracketSku === b.sku;
      html += `<div class="bracket-opt ${isSel?'sel':''} ${isRec?'recommended':''}"
        onclick="updateProd('${elId}','${ps.id}','bracketSku','${b.sku}');rerenderEl('${elId}')">
        ${isRec?'<div class="bracket-rec-tag">★ Recommended</div>':''}
        <div class="bracket-opt-name">${escH(b.name.replace("Flexible Mounting Bracket, ","").replace(", 5M Roll",""))}</div>
        <div class="bracket-opt-sku">${b.sku}</div>
      </div>`;
    });
    html += `</div></div>`;
  }
  return html;
}

// Element CRUD
function addElement(){ S.elements.push(newElement()); renderStep2(); }
function removeElement(id){
  if(!confirm('Remove this element?')) return;
  S.elements = S.elements.filter(e=>e.id!==id);
  S.elements.forEach(e=>{ if(e.groupId===id) e.groupId=''; });
  renderStep2();
}
function toggleElement(id){
  const el = S.elements.find(e=>e.id===id);
  if(el){ el.collapsed=!el.collapsed; rerenderEl(id); }
}
function updateEl(id, key, val){
  const el = S.elements.find(e=>e.id===id);
  if(el) el[key]=val;
}
function toggleGroupMember(elId, otherId, checked){
  const el    = S.elements.find(e=>e.id===elId);
  const other = S.elements.find(e=>e.id===otherId);
  if(!el||!other) return;
  if(checked){
    const gid = el.groupId || el.id;
    el.groupId    = gid;
    other.groupId = gid;
  } else {
    other.groupId = '';
    const stillGrouped = S.elements.some(e=>e.id!==elId && e.groupId && e.groupId===el.groupId);
    if(!stillGrouped) el.groupId = '';
  }
  rerenderEl(elId);
  // Refresh all other element cards so their checkboxes reflect the new grouping
  S.elements.forEach(e=>{ if(e.id!==elId) rerenderEl(e.id); });
}
// Product-section CRUD
function findPS(elId, psId){
  const el = S.elements.find(e=>e.id===elId);
  return el ? el.products.find(p=>p.id===psId) : null;
}
function addProduct(elId){
  const el = S.elements.find(e=>e.id===elId);
  if(el){ el.products.push(newProduct()); rerenderEl(elId); }
}
function removeProduct(elId, psId){
  const el = S.elements.find(e=>e.id===elId);
  if(el && el.products.length > 1){ el.products = el.products.filter(p=>p.id!==psId); rerenderEl(elId); }
}
function updateProd(elId, psId, key, val){
  const ps = findPS(elId, psId);
  if(ps) ps[key]=val;
}
function updateProdSku(elId, psId, sku){
  const ps = findPS(elId, psId);
  if(!ps) return;
  ps.ledSku=sku; ps.needsBrackets=null; ps.bracketSku=''; ps.splitterRuns=[];
  rerenderEl(elId);
}
function addRun(elId, psId){
  const ps = findPS(elId, psId);
  if(ps){ ps.runs.push(newRun()); rerenderEl(elId); }
}
function removeRun(elId, psId, runId){
  const ps = findPS(elId, psId);
  if(!ps || ps.runs.length <= 1) return;
  ps.runs = ps.runs.filter(r => r.id !== runId);
  ps.splitterRuns = (ps.splitterRuns || []).filter(id => id !== runId);
  rerenderEl(elId);
}
function toggleSplitterRun(elId, psId, runId, checked){
  const ps = findPS(elId, psId);
  if(!ps) return;
  if(!ps.splitterRuns) ps.splitterRuns = [];
  if(checked){ if(!ps.splitterRuns.includes(runId)) ps.splitterRuns.push(runId); }
  else        { ps.splitterRuns = ps.splitterRuns.filter(id => id !== runId); }
  rerenderEl(elId);
}
function updateRun(elId, psId, runId, key, val){
  const ps = findPS(elId, psId);
  if(ps){ const r=ps.runs.find(r=>r.id===runId); if(r) r[key]=val; }
}
function rerenderEl(id){
  const idx = S.elements.findIndex(e=>e.id===id);
  if(idx===-1) return;
  const el = S.elements[idx];
  const card = document.getElementById(`elcard-${id}`);
  if(!card) return;
  const tmp = document.createElement('div');
  tmp.innerHTML = renderElementCard(el, idx, buildLedOptions());
  card.replaceWith(tmp.firstElementChild);
}
function advanceToStep3(){
  if(S.elements.length===0){ alert('Add at least one project element before continuing.'); return; }
  S.step=3; render();
}

// ============================================================
//  STEP 3 — ADDITIONAL ITEMS
// ============================================================
function renderStep3(){
  let html = `
  <div class="page-hdr">
    <h1>Additional Items</h1>
    <p>Add any supplementary products needed beyond what was calculated from your elements — spares, accessories, or items not tied to a specific zone.</p>
  </div>
  <div class="card">
    <div class="card-title">Product Search</div>

    ${S.manualItems.length ? `
    <div style="margin-bottom:20px">
      ${S.manualItems.map(mi=>renderManualItem(mi)).join('')}
    </div>` : '<div style="color:var(--text-muted);font-size:13px;margin-bottom:16px">No items added yet. Search below to add products.</div>'}

    <div id="manualAddPanel">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="maSearch" placeholder="Search products by name, SKU, or category…"
          value="${escH(S.manualSearch)}" oninput="S.manualSearch=this.value;reRenderManualList()">
      </div>
      <div class="prod-list" id="maProdList">
        ${renderManualProductList(S.manualSearch)}
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-ghost" onclick="S.step=2;render()">← Edit Elements</button>
    <button class="btn btn-primary" onclick="S.step=4;render()">Calculate Results →</button>
  </div>`;
  setHTML('mainContent', html);
}

// ============================================================
//  STEP 4 — RESULTS
// ============================================================
function renderStep4(){
  const res = calculateProject();

  // Partition manual items into sections
  const manualLed     = S.manualItems.filter(mi=>{ const p=P(mi.sku); return p&&(p.type==='tape'||p.type==='unit'); });
  const manualCtrl    = S.manualItems.filter(mi=>{ const p=P(mi.sku); return p&&['system1','system2','controller','decoder','bridge','dimmer'].includes(p.type); });
  const manualCable   = S.manualItems.filter(mi=>{ const p=P(mi.sku); return p&&p.type==='cable'; });
  const manualDiff    = S.manualItems.filter(mi=>{ const p=P(mi.sku); return p&&p.type==='diffusion'; });
  const manualBracket = S.manualItems.filter(mi=>{ const p=P(mi.sku); return p&&p.type==='bracket'; });
  const manualOther   = S.manualItems.filter(mi=>{ const p=P(mi.sku); return p&&!['tape','unit','system1','system2','controller','decoder','bridge','dimmer','cable','diffusion','bracket','splitter'].includes(p.type); });

  const hasCable    = res.cable6Ft > 0 || res.cable3Ft > 0 || manualCable.length > 0;
  const hasBrackets = Object.keys(res.brackets).length > 0 || manualBracket.length > 0;

  let html = `
  <div class="page-hdr no-print" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div>
      <h1>Results & Bill of Materials</h1>
      <p>${escH(S.proj.name)}${S.proj.client?' · '+escH(S.proj.client):''}${S.proj.date?' · '+escH(S.proj.date):''}</p>
    </div>
    <button class="btn btn-secondary" onclick="window.print()">🖨 Print / Export</button>
  </div>
  <div class="print-only" style="border-bottom:2px solid #000;padding-bottom:12px;margin-bottom:20px">
    <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:20px">
      <div>
        <div style="font-size:22px;font-weight:800;letter-spacing:-.3px">${escH(S.proj.name)||'Untitled Project'}</div>
        ${S.proj.client?`<div style="font-size:14px;margin-top:3px;color:#333">Client / Job #: ${escH(S.proj.client)}</div>`:''}
      </div>
      <div style="text-align:right;font-size:12px;color:#555;white-space:nowrap">
        <div style="font-weight:600">Bill of Materials</div>
        <div>${escH(S.proj.date)||''}</div>
      </div>
    </div>
  </div>`;

  // ── PROJECT SUMMARY ────────────────────────────────────────
  const totalW       = res.groups.reduce((s,g)=>s+g.totalW, 0);
  const totalCh      = res.groups.reduce((s,g)=>s+g.totalChannels, 0);
  const totalFt      = res.ledItems.filter(i=>i.prod.type==='tape').reduce((s,i)=>s+i.totalFt, 0);
  const manualTapeFt = manualLed.reduce((s,mi)=>{ const p=P(mi.sku); return s+(p&&p.type==='tape'?(parseInt(mi.qty)||1)*p.rollFt:0); }, 0);
  const manualCableFt= manualCable.reduce((s,mi)=>{ const p=P(mi.sku); return s+(p?(parseInt(mi.qty)||1)*p.rollFt:0); }, 0);
  const totalCableFt = res.cable6Ft + res.cable3Ft + manualCableFt;

  // Equipment counts (auto-calculated + manual additions)
  let totalControllers=0, totalDimmers=0, totalDecoders=0, sumSplitters=0;
  res.groups.forEach(g=>{
    (g.equipment||[]).forEach(eq=>{
      const t=eq.prod.type;
      if(['system1','system2','controller'].includes(t)) totalControllers+=eq.qty;
      else if(t==='dimmer')  totalDimmers+=eq.qty;
      else if(t==='decoder') totalDecoders+=eq.qty;
    });
    g.elements.forEach(ce=>(ce.sections||[]).forEach(sec=>{ if(sec.splitter) sumSplitters+=sec.splitter.qty; }));
  });
  S.manualItems.forEach(mi=>{
    const p=P(mi.sku); if(!p) return;
    const qty=parseInt(mi.qty)||1;
    if(['system1','system2','controller'].includes(p.type)) totalControllers+=qty;
    else if(p.type==='dimmer')   totalDimmers+=qty;
    else if(p.type==='decoder')  totalDecoders+=qty;
    else if(p.type==='splitter') sumSplitters+=qty;
  });

  // Total physical runs = sum of qty across all run entries for tape products
  const totalRuns = S.elements.reduce((tot,el)=>
    tot+(el.products||[]).reduce((t,ps)=>{
      const pr=PRODUCTS.find(p=>p.sku===ps.ledSku);
      return t+(pr&&pr.type==='tape'?ps.runs.reduce((s,r)=>s+(parseInt(r.qty)||1),0):0);
    },0)
  ,0);

  // Total elements with actual LED data (across all groups)
  const totalElements = res.groups.reduce((s,g)=>s+g.elements.length,0);

  // Per-SKU LED breakdown: tape → footage + rolls, unit products → count
  const tapeSkuMap={}, unitSkuMap={};
  res.ledItems.forEach(item=>{
    if(item.prod.type==='tape'){ (tapeSkuMap[item.prod.sku]=tapeSkuMap[item.prod.sku]||{prod:item.prod,ft:0}).ft+=item.totalFt; }
    else { (unitSkuMap[item.prod.sku]=unitSkuMap[item.prod.sku]||{prod:item.prod,units:0}).units+=item.totalUnits; }
  });
  manualLed.forEach(mi=>{
    const p=P(mi.sku); if(!p) return; const qty=parseInt(mi.qty)||1;
    if(p.type==='tape'){ (tapeSkuMap[p.sku]=tapeSkuMap[p.sku]||{prod:p,ft:0}).ft+=qty*p.rollFt; }
    else { (unitSkuMap[p.sku]=unitSkuMap[p.sku]||{prod:p,units:0}).units+=qty; }
  });
  const tapeSkuItems = Object.values(tapeSkuMap);
  tapeSkuItems.forEach(t=>{ t.rollsNeeded=Math.ceil(t.ft/t.prod.rollFt); });
  const unitSkuItems = Object.values(unitSkuMap);

  const hasEquipment = totalControllers>0||totalDimmers>0||totalDecoders>0||sumSplitters>0;
  const hasLedBreakdown = tapeSkuItems.length||unitSkuItems.length;

  const sumLbl = (val,lbl) => `<div class="sum-item"><span class="sum-val">${val}</span><span class="sum-lbl">${lbl}</span></div>`;
  const sumSectionHdr = (title,first) => `<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin-bottom:6px${first?'':';margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.06)'}">${title}</div>`;

  html += `<div class="card">
    ${sumSectionHdr('Project',true)}
    <div class="summary-row" style="margin-top:0">
      ${sumLbl(fmt(totalW,0)+' W','Total Load')}
      ${sumLbl(totalCh,'Channels')}
      ${totalElements>0?sumLbl(totalElements,'Element'+(totalElements!==1?'s':'')):''}
      ${sumLbl(res.groups.length,'Control Group'+(res.groups.length!==1?'s':''))}
      ${sumLbl(totalRuns,'Total Runs')}
      ${hasCable?sumLbl(fmt(totalCableFt,0)+' ft','Cable'):''}
    </div>
    ${hasEquipment?`
    ${sumSectionHdr('Equipment')}
    <div class="summary-row" style="margin-top:0">
      ${totalControllers>0?sumLbl(totalControllers,'Controller'+(totalControllers!==1?'s':'')):''}
      ${totalDimmers>0?sumLbl(totalDimmers,'Dimmer'+(totalDimmers!==1?'s':'')):''}
      ${totalDecoders>0?sumLbl(totalDecoders,'Decoder'+(totalDecoders!==1?'s':'')):''}
      ${sumSplitters>0?sumLbl(sumSplitters,'Splitter'+(sumSplitters!==1?'s':'')):''}
    </div>`:''}
    ${hasLedBreakdown?`
    ${sumSectionHdr('LED Products')}
    <div class="summary-row" style="margin-top:0">
      ${tapeSkuItems.map(t=>`<div class="sum-item">
        <span class="sum-val">${fmt(t.ft,0)} ft <span style="font-size:13px;font-weight:600;color:var(--text-dim)">(${t.rollsNeeded} roll${t.rollsNeeded!==1?'s':''})</span></span>
        <span class="sum-lbl" style="text-transform:none;letter-spacing:0">${escH(t.prod.name.split(',')[0])}</span>
      </div>`).join('')}
      ${unitSkuItems.map(u=>`<div class="sum-item">
        <span class="sum-val">${u.units} unit${u.units!==1?'s':''}</span>
        <span class="sum-lbl" style="text-transform:none;letter-spacing:0">${escH(u.prod.name.split(',')[0])}</span>
      </div>`).join('')}
    </div>`:''}
  </div>`;

  // ── WARNINGS ──────────────────────────────────────────────
  if(res.warnings.length){
    html += `<div class="card">
      <div class="card-title">⚠ Flags &amp; Warnings</div>
      ${res.warnings.map(w=>`<div class="alert ${w.lvl==='danger'?'al-err':'al-warn'}">
        <span class="alert-icon">${w.lvl==='danger'?'✖':'⚠'}</span>
        <span>${escH(w.text)}</span>
      </div>`).join('')}
    </div>`;
  }

  // ── LED LIGHTING (by group → element) ────────────────────
  const projSplitters = {}; // accumulated while rendering LED Lighting, used for Splitters card
  if(res.groups.length || manualLed.length){
    html += `<div class="card">
      <div class="card-title">LED Lighting</div>
      <table class="bom-table">
        <thead><tr>
          <th style="width:36%">Element / Product</th>
          <th>Footage / Units</th>
          <th>Rolls / Units</th>
          <th>Load</th>
        </tr></thead>
        <tbody>`;

    // Accumulate project totals per SKU for the summary rows at bottom
    const projTotals = {};
    res.groups.forEach(g => {
      // Group header row
      const groupLabel = g.elements.length > 1
        ? `Group: ${escH(g.name)}`
        : escH(g.elements[0]?.name || '(unnamed)');
      html += `<tr class="bom-group-header"><td colspan="4">${groupLabel}${g.elements.length>1?` (${g.elements.length} elements)`:''} — ${fmt(g.totalW,0)}W total</td></tr>`;

      g.elements.forEach(ce => {
        if(!ce.sections||!ce.sections.length) return;
        if(ce.sections.length > 1){
          html += `<tr><td colspan="4" style="padding:8px 10px 2px 20px;font-size:12px;color:var(--text-dim);font-style:italic">${escH(ce.name||'(unnamed)')} — ${ce.sections.length} products</td></tr>`;
        }
        ce.sections.forEach(sec => {
          const isTape = sec.prod.type==='tape';
          if(!projTotals[sec.prod.sku]) projTotals[sec.prod.sku]={prod:sec.prod,totalFt:0,totalUnits:0,totalW:0,rollsNeeded:0};
          projTotals[sec.prod.sku].totalFt    += sec.totalFt;
          projTotals[sec.prod.sku].totalUnits += sec.totalUnits;
          projTotals[sec.prod.sku].totalW     += sec.totalW;
          const indent = ce.sections.length>1?'32px':'20px';
          html += `<tr>
            <td style="padding-left:${indent}">
              ${ce.sections.length===1?`<span style="color:var(--text-dim);font-size:12px">${escH(ce.name||'(unnamed)')}</span><br>`:''}
              ${escH(sec.prod.name)}<span class="bom-sku">${sec.prod.sku}</span>
            </td>
            <td>${isTape?`${fmt(sec.totalFt,1)} ft total`:`${sec.totalUnits} unit${sec.totalUnits!==1?'s':''}`}</td>
            <td class="bom-qty" style="font-size:14px">${isTape?`${sec.rollsNeeded} roll${sec.rollsNeeded!==1?'s':''}`:`${sec.totalUnits} unit${sec.totalUnits!==1?'s':''}`}</td>
            <td>${fmt(sec.totalW,1)} W</td>
          </tr>`;
          // Run detail sub-rows for tape products
          if(isTape && sec.runDetails && sec.runDetails.length){
            const runIndent = ce.sections.length>1?'44px':'30px';
            sec.runDetails.forEach((r,ri) => {
              const label = r.qty > 1 ? `${r.qty} × ${fmt(r.footage,1)} ft = ${fmt(r.totalFt,1)} ft` : `${fmt(r.footage,1)} ft`;
              html += `<tr style="background:rgba(255,255,255,.015)">
                <td style="padding-left:${runIndent};font-size:12px;color:var(--text-dim)">Run ${ri+1}</td>
                <td style="font-size:12px;color:var(--text-dim)">${label}</td>
                <td style="font-size:12px;color:var(--text-muted)">—</td>
                <td style="font-size:12px;color:var(--text-muted)">—</td>
              </tr>`;
            });
          }
          // Diffusion rows for this section
          Object.values(sec.diffusion||{}).forEach(d => {
            if(!d.prod || !d.ft) return;
            html += `<tr style="background:rgba(240,165,0,.04)">
              <td style="padding-left:${ce.sections.length>1?'44px':'30px'};font-size:12px">
                <span style="color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:.4px;display:block">Diffusion</span>
                ${escH(d.prod.name)}<span class="bom-sku">${d.prod.sku}</span>
              </td>
              <td style="font-size:12px">${fmt(d.ft,1)} ft</td>
              <td class="bom-qty" style="font-size:13px">${d.rolls} roll${d.rolls!==1?'s':''}</td>
              <td style="font-size:12px;color:var(--text-muted)">—</td>
            </tr>`;
          });
          // Splitter row for this section
          if(sec.splitter){
            const sp = sec.splitter;
            const spIndent = ce.sections.length>1?'44px':'30px';
            if(!projSplitters[sp.prod.sku]) projSplitters[sp.prod.sku] = { prod: sp.prod, qty: 0 };
            projSplitters[sp.prod.sku].qty += sp.qty;
            html += `<tr style="background:rgba(85,170,255,.05)">
              <td style="padding-left:${spIndent};font-size:12px">
                <span style="color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:.4px;display:block">Splitter — ${sp.runCount} runs</span>
                ${escH(sp.prod.name)}<span class="bom-sku">${sp.prod.sku}</span>
              </td>
              <td style="font-size:12px;color:var(--text-dim)">${sp.runCount} outputs used</td>
              <td class="bom-qty" style="font-size:13px">${sp.qty}</td>
              <td style="font-size:12px;color:var(--text-muted)">—</td>
            </tr>`;
          }
        });
      });
    });

    // Project totals summary
    const ptVals = Object.values(projTotals);
    if(ptVals.length){
      ptVals.forEach(pt => {
        if(pt.prod.type==='tape') pt.rollsNeeded = Math.ceil(pt.totalFt / pt.prod.rollFt);
        else pt.rollsNeeded = pt.totalUnits;
      });
      html += `<tr><td colspan="4" style="padding:10px 8px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);border-top:2px solid var(--border)">Project Totals by Product</td></tr>`;
      ptVals.forEach(pt => {
        const isTape = pt.prod.type==='tape';
        html += `<tr style="background:rgba(255,255,255,.02)">
          <td><b>${escH(pt.prod.name)}</b><span class="bom-sku">${pt.prod.sku}</span></td>
          <td>${isTape ? `${fmt(pt.totalFt,1)} ft` : `${pt.totalUnits} units`}</td>
          <td class="bom-qty">${isTape ? `${pt.rollsNeeded} roll${pt.rollsNeeded!==1?'s':''}` : `${pt.totalUnits} unit${pt.totalUnits!==1?'s':''}`}</td>
          <td>${fmt(pt.totalW,1)} W</td>
        </tr>`;
      });
    }
    // Manual / additional LED items
    if(manualLed.length){
      html += `<tr><td colspan="4" style="padding:10px 8px 4px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);border-top:2px solid var(--border)">Additional / Unassigned Items</td></tr>`;
      manualLed.forEach(mi => {
        const p = P(mi.sku);
        const qty = parseInt(mi.qty)||1;
        const isTape = p.type==='tape';
        html += `<tr style="background:rgba(255,255,255,.02)">
          <td><b>${escH(p.name)}</b><span class="bom-sku">${p.sku}</span>${mi.note?`<span class="bom-note" style="margin-left:8px;color:var(--text-muted);font-size:11px">${escH(mi.note)}</span>`:'<span class="bom-note" style="margin-left:8px;color:var(--text-muted);font-size:11px;font-style:italic">unassigned</span>'}</td>
          <td>—</td>
          <td class="bom-qty">${qty} ${isTape?`roll${qty!==1?'s':''}`:`unit${qty!==1?'s':''}`}</td>
          <td style="color:var(--text-muted)">—</td>
        </tr>`;
      });
    }
    html += `</tbody></table></div>`;
  }

  // ── CONTROL EQUIPMENT ─────────────────────────────────────
  html += `<div class="card">
    <div class="card-title">${S.proj.controlType==='dmx'?'DMX Controllers &amp; Decoders':'Manual Dimmers'}</div>
    <table class="bom-table">
      <thead><tr><th style="width:40%">Product</th><th>Group / Zone</th><th>Qty</th><th>Notes</th></tr></thead>
      <tbody>`;
  res.groups.forEach(g=>{
    if(!g.equipment || g.equipment.length===0) return;
    html += `<tr class="bom-group-header"><td colspan="4">${escH(g.name)} — ${fmt(g.totalW,1)}W · ${g.totalChannels} channels</td></tr>`;
    g.equipment.forEach(eq=>{
      html += `<tr>
        <td>${escH(eq.prod.name)}<span class="bom-sku">${eq.prod.sku}</span></td>
        <td><span style="color:var(--text-dim);font-size:12px">${escH(g.name)}</span></td>
        <td class="bom-qty">${eq.qty}</td>
        <td class="bom-note">${escH(eq.note)}${eq.prod.phaseout?` <span class="flag-w">PHASING OUT</span>`:''}${eq.prod.maxA===null&&eq.prod.type==='decoder'?` <span class="flag-w">MAX AMPS TBD</span>`:''}</td>
      </tr>`;
    });
    // Controller override row — lets installers add units for load splitting / line loss
    if(g.computedCtrlQty !== undefined){
      const override = S.ctrlOverrides[g.id] ? parseInt(S.ctrlOverrides[g.id]) : null;
      const displayQty = override || g.computedCtrlQty;
      const isOverridden = override && override !== g.computedCtrlQty;
      const isBelowMin = override && override < g.computedCtrlQty;
      html += `<tr style="background:rgba(255,255,255,.015)">
        <td colspan="4" style="padding:8px 12px 10px 20px">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px">
            <span style="font-size:11px;color:var(--text-dim)">Calculated min: <b>${g.computedCtrlQty}</b> unit${g.computedCtrlQty!==1?'s':''}</span>
            <span style="color:var(--border)">|</span>
            <label style="font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:6px">
              Override count:
              <input type="number" min="1" value="${displayQty}"
                style="width:60px;padding:3px 6px;font-size:12px;border:1px solid ${isBelowMin?'var(--danger)':isOverridden?'var(--accent)':'var(--border)'};border-radius:4px;background:var(--surface);color:var(--text)"
                onchange="updateCtrlOverride('${g.id}',this.value)">
            </label>
            ${isOverridden && !isBelowMin ? `<span style="font-size:11px;color:var(--accent)">+${override - g.computedCtrlQty} extra unit${(override-g.computedCtrlQty)!==1?'s':''} for load splitting</span>` : ''}
            ${isBelowMin ? `<span style="font-size:11px;color:#e55;">Below calculated minimum — verify load distribution</span>` : ''}
            ${isOverridden ? `<button onclick="updateCtrlOverride('${g.id}',null)" style="font-size:11px;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:transparent;color:var(--text-dim);cursor:pointer">Reset</button>` : ''}
          </div>
        </td>
      </tr>`;
    }
  });
  if(manualCtrl.length){
    html += `<tr class="bom-group-header"><td colspan="4">Additional / Unassigned</td></tr>`;
    manualCtrl.forEach(mi=>{
      const p=P(mi.sku); const qty=parseInt(mi.qty)||1;
      html += `<tr>
        <td>${escH(p.name)}<span class="bom-sku">${p.sku}</span></td>
        <td><span style="color:var(--text-muted);font-size:12px;font-style:italic">unassigned</span></td>
        <td class="bom-qty">${qty}</td>
        <td class="bom-note">${mi.note?escH(mi.note):''}${p.phaseout?` <span class="flag-w">PHASING OUT</span>`:''}</td>
      </tr>`;
    });
  }
  html += `</tbody></table></div>`;

  // ── CABLE ─────────────────────────────────────────────────
  if(hasCable){
    html += `<div class="card">
      <div class="card-title">Cable</div>
      <table class="bom-table">
        <thead><tr><th style="width:40%">Product</th><th>Linear Footage</th><th>Boxes to Order (500 ft)</th></tr></thead>
        <tbody>`;
    if(res.cable6Ft>0){
      html += `<tr>
        <td>Six Conductor LED Light Wire, (1)16GA+(5)20GA<span class="bom-sku">6600.000</span></td>
        <td>${fmt(res.cable6Ft,1)} ft</td>
        <td class="bom-qty">${res.cable6Boxes} box${res.cable6Boxes!==1?'es':''}</td>
      </tr>`;
    }
    if(res.cable3Ft>0){
      html += `<tr>
        <td>Three Conductor LED Light Wire, (1)18GA+(2)20GA<span class="bom-sku">6300.000</span></td>
        <td>${fmt(res.cable3Ft,1)} ft</td>
        <td class="bom-qty">${res.cable3Boxes} box${res.cable3Boxes!==1?'es':''}</td>
      </tr>`;
    }
    if(manualCable.length){
      if(res.cable6Ft>0||res.cable3Ft>0) html += `<tr><td colspan="3" style="padding:8px 8px 2px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);border-top:1px solid var(--border)">Additional / Unassigned</td></tr>`;
      manualCable.forEach(mi=>{
        const p=P(mi.sku); const qty=parseInt(mi.qty)||1;
        html += `<tr>
          <td>${escH(p.name)}<span class="bom-sku">${p.sku}</span>${mi.note?`<span class="bom-note" style="margin-left:8px;color:var(--text-muted);font-size:11px">${escH(mi.note)}</span>`:'<span class="bom-note" style="margin-left:8px;color:var(--text-muted);font-size:11px;font-style:italic">unassigned</span>'}</td>
          <td>—</td>
          <td class="bom-qty">${qty} box${qty!==1?'es':''}</td>
        </tr>`;
      });
    }
    html += `</tbody></table></div>`;
  }

  // ── MOUNTS & BRACKETS ─────────────────────────────────────
  if(hasBrackets){
    html += `<div class="card">
      <div class="card-title">Mounts &amp; Brackets</div>
      <table class="bom-table">
        <thead><tr><th style="width:40%">Product</th><th>Linear Footage</th><th>Rolls to Order (16.4 ft)</th></tr></thead>
        <tbody>`;
    Object.values(res.brackets).forEach(b=>{
      html += `<tr>
        <td>${escH(b.prod.name)}<span class="bom-sku">${b.prod.sku}</span></td>
        <td>${fmt(b.ft,1)} ft</td>
        <td class="bom-qty">${b.rolls} roll${b.rolls!==1?'s':''}</td>
      </tr>`;
    });
    if(manualBracket.length){
      if(Object.keys(res.brackets).length) html += `<tr><td colspan="3" style="padding:8px 8px 2px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);border-top:1px solid var(--border)">Additional / Unassigned</td></tr>`;
      manualBracket.forEach(mi=>{
        const p=P(mi.sku); const qty=parseInt(mi.qty)||1;
        html += `<tr>
          <td>${escH(p.name)}<span class="bom-sku">${p.sku}</span>${mi.note?`<span class="bom-note" style="margin-left:8px;color:var(--text-muted);font-size:11px">${escH(mi.note)}</span>`:'<span class="bom-note" style="margin-left:8px;color:var(--text-muted);font-size:11px;font-style:italic">unassigned</span>'}</td>
          <td>—</td>
          <td class="bom-qty">${qty} roll${qty!==1?'s':''}</td>
        </tr>`;
      });
    }
    html += `</tbody></table></div>`;
  }

  // ── SILICONE DIFFUSION ────────────────────────────────────
  const diffVals = Object.values(res.diffusion||{});
  if(diffVals.length || manualDiff.length){
    html += `<div class="card">
      <div class="card-title">Silicone Diffusion</div>
      <table class="bom-table">
        <thead><tr><th style="width:40%">Product</th><th>Linear Footage</th><th>Rolls to Order</th></tr></thead>
        <tbody>`;
    diffVals.forEach(d=>{
      html += `<tr>
        <td>${escH(d.prod.name)}<span class="bom-sku">${d.prod.sku}</span></td>
        <td>${fmt(d.ft,1)} ft</td>
        <td class="bom-qty">${d.rolls} roll${d.rolls!==1?'s':''} (${d.prod.rollFt} ft ea.)</td>
      </tr>`;
    });
    if(manualDiff.length){
      if(diffVals.length) html += `<tr><td colspan="3" style="padding:8px 8px 2px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);border-top:1px solid var(--border)">Additional / Unassigned</td></tr>`;
      manualDiff.forEach(mi=>{
        const p=P(mi.sku); const qty=parseInt(mi.qty)||1;
        html += `<tr>
          <td>${escH(p.name)}<span class="bom-sku">${p.sku}</span>${mi.note?`<span class="bom-note" style="margin-left:8px;color:var(--text-muted);font-size:11px">${escH(mi.note)}</span>`:'<span class="bom-note" style="margin-left:8px;color:var(--text-muted);font-size:11px;font-style:italic">unassigned</span>'}</td>
          <td>—</td>
          <td class="bom-qty">${qty} roll${qty!==1?'s':''} (${p.rollFt} ft ea.)</td>
        </tr>`;
      });
    }
    html += `</tbody></table></div>`;
  }

  // ── SPLITTERS ─────────────────────────────────────────────
  const splitterVals = Object.values(projSplitters||{});
  const manualSplitters = S.manualItems.filter(mi=>{ const p=P(mi.sku); return p&&p.type==='splitter'; });
  if(splitterVals.length || manualSplitters.length){
    html += `<div class="card">
      <div class="card-title">Splitters</div>
      <table class="bom-table">
        <thead><tr><th style="width:55%">Product</th><th>Outputs Used</th><th>Qty</th></tr></thead>
        <tbody>`;
    splitterVals.forEach(sp => {
      const maxOut = sp.prod.sku === '5500.000' ? 3 : 9;
      html += `<tr>
        <td>${escH(sp.prod.name)}<span class="bom-sku">${sp.prod.sku}</span></td>
        <td style="font-size:12px;color:var(--text-dim)">up to ${maxOut} outputs</td>
        <td class="bom-qty">${sp.qty}</td>
      </tr>`;
    });
    if(manualSplitters.length){
      if(splitterVals.length) html += `<tr><td colspan="3" style="padding:8px 8px 2px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);border-top:1px solid var(--border)">Additional / Unassigned</td></tr>`;
      manualSplitters.forEach(mi => {
        const p=P(mi.sku); const qty=parseInt(mi.qty)||1;
        html += `<tr>
          <td>${escH(p.name)}<span class="bom-sku">${p.sku}</span>${mi.note?`<span class="bom-note" style="margin-left:8px;color:var(--text-muted);font-size:11px">${escH(mi.note)}</span>`:'<span class="bom-note" style="margin-left:8px;color:var(--text-muted);font-size:11px;font-style:italic">unassigned</span>'}</td>
          <td>—</td>
          <td class="bom-qty">${qty}</td>
        </tr>`;
      });
    }
    html += `</tbody></table></div>`;
  }

  // ── OTHER EQUIPMENT (switches, etc.) ──────────────────────
  if(manualOther.length){
    html += `<div class="card">
      <div class="card-title">Other Equipment</div>
      <table class="bom-table">
        <thead><tr><th style="width:55%">Product</th><th>Qty</th><th>Notes</th></tr></thead>
        <tbody>`;
    manualOther.forEach(mi=>{
      const p=P(mi.sku); const qty=parseInt(mi.qty)||1;
      html += `<tr>
        <td>${escH(p.name)}<span class="bom-sku">${p.sku}</span></td>
        <td class="bom-qty">${qty}</td>
        <td class="bom-note">${mi.note?escH(mi.note):''}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  html += `<div class="btn-row no-print" style="margin-top:8px">
    <button class="btn btn-ghost" onclick="S.step=3;render()">← Additional Items</button>
    <button class="btn btn-primary" onclick="window.print()">🖨 Print / Export PDF</button>
  </div>`;

  setHTML('mainContent', html);
}

function renderManualItem(mi){
  return `<div class="ma-item" id="maitem-${mi.id}">
    <div class="ma-info">
      <div class="ma-name">${escH(mi.name)}</div>
      <div class="ma-sku">${mi.sku}</div>
    </div>
    <div class="ma-qty-wrap">
      <label style="font-size:11px;color:var(--text-dim)">Qty</label>
      <input type="number" min="1" value="${mi.qty}" onchange="updateManualItem('${mi.id}','qty',this.value)" style="width:64px">
    </div>
    <div class="ma-note-wrap">
      <input type="text" value="${escH(mi.note)}" placeholder="Note (optional)" oninput="updateManualItem('${mi.id}','note',this.value)">
    </div>
    <button class="btn btn-danger btn-xs" onclick="removeManualItem('${mi.id}')">✕</button>
  </div>`;
}

function renderManualProductList(search){
  const q = (search||'').toLowerCase().trim();
  const CAT_ORDER = ['LED Lighting','DMX Controllers & Decoders','Manual Dimmers','Cable','Silicone Diffusion','Mounts & Brackets','Splitters','Switches'];
  const filtered = PRODUCTS.filter(p=>p.type!=='bridge' && (
    !q || p.name.toLowerCase().includes(q) || p.sku.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q)
  ));
  if(!filtered.length) return '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">No products match your search.</div>';

  const byCat = {};
  CAT_ORDER.forEach(c=>{ byCat[c]=[]; });
  filtered.forEach(p=>{ if(byCat[p.cat]) byCat[p.cat].push(p); else { byCat[p.cat]=byCat[p.cat]||[]; byCat[p.cat].push(p); } });

  let html='';
  Object.entries(byCat).forEach(([cat,prods])=>{
    if(!prods.length) return;
    html += `<div class="prod-cat-header">${escH(cat)}</div>`;
    prods.forEach(p=>{
      html += `<div class="prod-item" onclick="addManualItem('${p.sku}')">
        <div class="prod-item-info">
          <div class="prod-item-name">${escH(p.name)}</div>
          <div class="prod-item-sku">${p.sku}</div>
        </div>
        <button class="prod-item-add" onclick="event.stopPropagation();addManualItem('${p.sku}')">+ Add</button>
      </div>`;
    });
  });
  return html;
}

function reRenderManualList(){
  const list = $('maProdList');
  if(list) list.innerHTML = renderManualProductList(S.manualSearch);
}

function addManualItem(sku){
  const prod = P(sku);
  if(!prod) return;
  const existing = S.manualItems.find(m=>m.sku===sku);
  if(existing){ existing.qty = (parseInt(existing.qty)||0) + 1; }
  else { S.manualItems.push({ id:uid(), sku, name:prod.name, qty:1, note:'' }); }
  // Re-render the manual items section without losing the search state
  const panel = document.getElementById('manualAddPanel');
  const manualItemsArea = panel ? panel.previousElementSibling : null;
  if(S.step===3) renderStep3();
}

function removeManualItem(id){
  S.manualItems = S.manualItems.filter(m=>m.id!==id);
  if(S.step===3) renderStep3();
}

function updateManualItem(id, key, val){
  const m = S.manualItems.find(m=>m.id===id);
  if(!m) return;
  m[key] = key==='qty' ? Math.max(1,parseInt(val)||1) : val;
  if(key==='qty'){
    if(S.step===3) renderStep3();
    else if(S.step===4) renderStep4();
  }
}

function updateCtrlOverride(groupId, val){
  if(val === null || val === '' || val === undefined){
    delete S.ctrlOverrides[groupId];
  } else {
    const n = parseInt(val);
    if(n >= 1) S.ctrlOverrides[groupId] = n;
  }
  if(S.step === 4) renderStep4();
}

// ============================================================
//  MAIN RENDER
// ============================================================
function gotoStep(n){ S.step=n; render(); }

function render(){
  renderNav();
  if(S.step===1) renderStep1();
  else if(S.step===2) renderStep2();
  else if(S.step===3) renderStep3();
  else if(S.step===4) renderStep4();
  window.scrollTo({top:0,behavior:'smooth'});
}

render();
</script>
</body>
</html>
